<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-synth" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00897B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="380" fill="white"/>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">SPAR-Kit: Structured Persona-Argumentation for Reasoning</text>
  <text x="460" y="46" text-anchor="middle" font-size="11" fill="#777">Stress-test decisions through structured disagreement</text>

  <!-- ============ STAGE 1: Decision Question ============ -->
  <rect x="20" y="130" width="110" height="60" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="75" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976D2">Decision</text>
  <text x="75" y="171" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976D2">Question</text>

  <!-- Arrow 1 -->
  <line x1="130" y1="160" x2="168" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="149" y="152" text-anchor="middle" font-size="9" fill="#777">SCOPE</text>

  <!-- ============ STAGE 2: Four Personas (Compass) ============ -->
  <rect x="170" y="72" width="200" height="178" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="270" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#6A1B9A">POPULATE</text>

  <!-- North -->
  <rect x="215" y="104" width="110" height="28" rx="5" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/>
  <text x="270" y="123" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">🔵 N: Visionary</text>

  <!-- East -->
  <rect x="215" y="138" width="110" height="28" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="270" y="157" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E7D32">🟢 E: Challenger</text>

  <!-- South -->
  <rect x="215" y="172" width="110" height="28" rx="5" fill="#FFF8E1" stroke="#F57F17" stroke-width="1"/>
  <text x="270" y="191" text-anchor="middle" font-size="10" font-weight="bold" fill="#E65100">🟡 S: Pragmatist</text>

  <!-- West -->
  <rect x="215" y="206" width="110" height="28" rx="5" fill="#FFEBEE" stroke="#F44336" stroke-width="1"/>
  <text x="270" y="225" text-anchor="middle" font-size="10" font-weight="bold" fill="#C62828">🔴 W: Sage</text>

  <!-- Arrow 2 -->
  <line x1="370" y1="160" x2="408" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ STAGE 3: RUMBLE (3 Rounds) ============ -->
  <rect x="410" y="72" width="180" height="178" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="500" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">RUMBLE</text>

  <!-- Round 1 -->
  <rect x="425" y="104" width="150" height="36" rx="5" fill="white" stroke="#FF9800" stroke-width="1"/>
  <text x="500" y="119" text-anchor="middle" font-size="10" font-weight="bold" fill="#E65100">R1: Opening</text>
  <text x="500" y="133" text-anchor="middle" font-size="9" fill="#777">State positions</text>

  <!-- Round 2 -->
  <rect x="425" y="148" width="150" height="36" rx="5" fill="white" stroke="#FF9800" stroke-width="1"/>
  <text x="500" y="163" text-anchor="middle" font-size="10" font-weight="bold" fill="#E65100">R2: Clash</text>
  <text x="500" y="177" text-anchor="middle" font-size="9" fill="#777">Challenge each other</text>

  <!-- Round 3 -->
  <rect x="425" y="192" width="150" height="36" rx="5" fill="white" stroke="#FF9800" stroke-width="1"/>
  <text x="500" y="207" text-anchor="middle" font-size="10" font-weight="bold" fill="#E65100">R3: Final</text>
  <text x="500" y="221" text-anchor="middle" font-size="9" fill="#777">Refined positions</text>

  <!-- Arrow 3 -->
  <line x1="590" y1="160" x2="628" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="609" y="152" text-anchor="middle" font-size="9" fill="#777">KNIT</text>

  <!-- ============ STAGE 4: Synthesis ============ -->
  <rect x="630" y="105" width="130" height="110" rx="10" fill="#E0F2F1" stroke="#00897B" stroke-width="2"/>
  <text x="695" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="#00695C">Synthesis</text>
  <text x="695" y="155" text-anchor="middle" font-size="10" fill="#555">Tensions mapped</text>
  <text x="695" y="170" text-anchor="middle" font-size="10" fill="#555">Blind spots found</text>
  <text x="695" y="185" text-anchor="middle" font-size="10" fill="#555">Insights extracted</text>

  <!-- Arrow 4 -->
  <line x1="760" y1="160" x2="798" y2="160" stroke="#00897B" stroke-width="1.5" marker-end="url(#arrow-synth)"/>

  <!-- ============ STAGE 5: Decision ============ -->
  <rect x="800" y="125" width="100" height="70" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="850" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">Better</text>
  <text x="850" y="173" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">Decision</text>

  <!-- ============ Bottom: PROBE ============ -->
  <path d="M 500 250 L 500 290 L 270 290 L 270 250" fill="none" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="385" y="305" text-anchor="middle" font-size="10" fill="#7B1FA2" font-style="italic">PROBE: "What is SPAR itself preventing us from seeing?"</text>

  <!-- ============ Legend ============ -->
  <rect x="130" y="340" width="12" height="12" rx="2" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
  <text x="148" y="351" font-size="10" fill="#555">Persona Instantiation</text>

  <rect x="310" y="340" width="12" height="12" rx="2" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
  <text x="328" y="351" font-size="10" fill="#555">Structured Dialectic</text>

  <rect x="480" y="340" width="12" height="12" rx="2" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="498" y="351" font-size="10" fill="#555">Tension Synthesis</text>

  <line x1="630" y1="346" x2="670" y2="346" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="678" y="351" font-size="10" fill="#555">Meta-critique loop</text>
</svg>
